<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="greenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#000000"/>
  
  <!-- Code brackets with gradient -->
  <path d="M 30 25 L 20 50 L 30 75" stroke="url(#greenGradient)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 70 25 L 80 50 L 70 75" stroke="url(#greenGradient)" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Center slash -->
  <line x1="55" y1="30" x2="45" y2="70" stroke="url(#greenGradient)" stroke-width="6" stroke-linecap="round"/>
</svg>
